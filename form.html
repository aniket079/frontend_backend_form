<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
        }

        .container{
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        input{
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            background: black;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            opacity: 0.9;
        }

        #message{
            margin-top: 15px;
            text-align: center;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>User Form</h2>

        <form id="userForm">

            <input 
                type="text" 
                id="username" 
                placeholder="Enter Username"
                required
            />

            <input 
                type="email" 
                id="email" 
                placeholder="Enter Email"
                required
            />

            <button type="submit">
                Submit
            </button>

        </form>

        <p id="message"></p>

    </div>

    <script>

        const form = document.getElementById("userForm");

        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            console.log("data from user",username,email);
            try{

                const response = await fetch(
                    "http://localhost:3000/api/users/submit",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            username,
                            email
                        })
                    }
                );

                const data = await response.json();

                document.getElementById("message").innerText =
                    data.message;

            }
            catch(error){

                document.getElementById("message").innerText =
                    "Something went wrong";

                console.log(error);
            }

        });

    </script>

</body>
</html>
